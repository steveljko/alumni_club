openapi: 3.0.3
info:
  title: 'Alumni Club API'
  description: 'Simple yet powerful api for alumni club app'
  version: 1.0.0
servers:
  -
    url: 'http://localhost:8000'
paths:
  /api/user:
    get:
      summary: ''
      operationId: getApiUser
      description: ''
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  id: 1
                  name: 'Mr. Lorenzo Gislason'
                  email: admin@admin.com
                  email_verified_at: '2024-07-12T13:23:13.000000Z'
                  initial_password_changed: 0
                  created_at: '2024-07-12T13:23:14.000000Z'
                  updated_at: '2024-07-12T21:07:19.000000Z'
                  details: null
                properties:
                  id:
                    type: integer
                    example: 1
                  name:
                    type: string
                    example: 'Mr. Lorenzo Gislason'
                  email:
                    type: string
                    example: admin@admin.com
                  email_verified_at:
                    type: string
                    example: '2024-07-12T13:23:13.000000Z'
                  initial_password_changed:
                    type: integer
                    example: 0
                  created_at:
                    type: string
                    example: '2024-07-12T13:23:14.000000Z'
                  updated_at:
                    type: string
                    example: '2024-07-12T21:07:19.000000Z'
                  details:
                    type: string
                    example: null
      tags:
        - Endpoints
      security: []
  /api/login:
    post:
      summary: ''
      operationId: postApiLogin
      description: ''
      parameters: []
      responses: {  }
      tags:
        - Endpoints
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  description: 'Must be a valid email address. Must be at least 8 characters. Must not be greater than 256 characters.'
                  example: haleigh.frami@example.com
                password:
                  type: string
                  description: 'Must be at least 6 characters. Must not be greater than 256 characters.'
                  example: '&fW`%VmeG#SaqN@_m9('
              required:
                - email
                - password
      security: []
  /api/register:
    post:
      summary: ''
      operationId: postApiRegister
      description: ''
      parameters: []
      responses: {  }
      tags:
        - Endpoints
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: 'Must be at least 3 characters. Must not be greater than 256 characters.'
                  example: imwpqepoavmgnubbrozjiqwey
                email:
                  type: string
                  description: 'Must be a valid email address. Must be at least 8 characters. Must not be greater than 256 characters.'
                  example: amanda.koepp@example.com
              required:
                - name
                - email
      security: []
  /api/change-initial-password:
    put:
      summary: ''
      operationId: putApiChangeInitialPassword
      description: ''
      parameters: []
      responses: {  }
      tags:
        - Endpoints
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                password:
                  type: string
                  description: 'Must be at least 8 characters. Must not be greater than 256 characters.'
                  example: '3W8Q*hZ)GETN'
              required:
                - password
      security: []
  /api/change-password:
    put:
      summary: ''
      operationId: putApiChangePassword
      description: ''
      parameters: []
      responses: {  }
      tags:
        - Endpoints
      security: []
  /api/change-details:
    patch:
      summary: ''
      operationId: patchApiChangeDetails
      description: ''
      parameters: []
      responses: {  }
      tags:
        - Endpoints
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                date_of_birth:
                  type: string
                  description: 'Must be a valid date in the format <code>d-m-Y</code>.'
                  example: 15-07-2024
                gender:
                  type: string
                  description: ''
                  example: nam
                email_visible:
                  type: boolean
                  description: ''
                  example: false
                phone_number:
                  type: string
                  description: 'Must match the regex /^\+381[0-9]{8,9}$/.'
                  example: '+381497839114'
                phone_number_visible:
                  type: boolean
                  description: ''
                  example: false
                uni_start_year:
                  type: integer
                  description: 'Must be 4 digits.'
                  example: 8
                uni_finish_year:
                  type: integer
                  description: 'Must be 4 digits.'
                  example: 20
                bio:
                  type: string
                  description: 'Must be at least 8 characters. Must not be greater than 512 characters.'
                  example: nti
              required:
                - date_of_birth
                - gender
                - email_visible
                - phone_number
                - phone_number_visible
                - uni_start_year
                - uni_finish_year
      security: []
  /api/job/create:
    post:
      summary: ''
      operationId: postApiJobCreate
      description: ''
      parameters: []
      responses: {  }
      tags:
        - Endpoints
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                comapny_name:
                  type: string
                  description: 'Must be at least 3 characters. Must not be greater than 16 characters.'
                  example: cgci
                position:
                  type: string
                  description: 'Must be at least 3 characters. Must not be greater than 24 characters.'
                  example: qayopz
                start_date:
                  type: string
                  description: 'Must be a valid date. Must be a date before <code>end_date</code>.'
                  example: '2011-05-31'
                end_date:
                  type: string
                  description: 'Must be a valid date. Must be a date after <code>start_date</code>.'
                  example: '2117-01-31'
                desc:
                  type: string
                  description: 'Must be at least 8 characters. Must not be greater than 256 characters.'
                  example: yjjmzgejnqfbypklehmmeejfc
              required:
                - comapny_name
                - position
                - start_date
                - end_date
      security: []
tags:
  -
    name: Endpoints
    description: ''
